name: Azure Static Web Apps

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build adapter and example
        run: bun run build && bun run test:example

      - name: Verify deploy artifacts
        run: |
          test -f examples/basic/dist/client/index.html
          test -f examples/basic/dist/client/staticwebapp.config.json
          test -f examples/basic/dist/client/admin/index.html
          test -f examples/basic/dist/client/admin/config.yml
          grep -Fq '"/admin/*"' examples/basic/dist/client/staticwebapp.config.json
          test -f examples/basic/dist/api/host.json
          test -f examples/basic/dist/api/package.json
          test -f examples/basic/dist/api/server/index.mjs
          grep -q '"react"' examples/basic/dist/api/package.json
          find examples/basic/dist/client -maxdepth 2 -type f | sort
          find examples/basic/dist/api -maxdepth 3 -type f | sort

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: examples/basic/dist/client
          api_location: examples/basic/dist/api
          output_location: ""
          skip_app_build: true

      - name: Smoke test production deployment
        run: |
          for attempt in $(seq 1 12); do
            status="$(curl -sS -o /tmp/swa-health.json -w "%{http_code}" https://blue-wave-00d0bf30f.7.azurestaticapps.net/api/health || true)"
            if [ "$status" = "200" ]; then
              cat /tmp/swa-health.json
              exit 0
            fi
            echo "Attempt $attempt: /api/health returned $status"
            sleep 10
          done
          echo "Production /api/health did not return 200"
          cat /tmp/swa-health.json || true
          exit 1

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
          app_location: examples/basic/dist/client
